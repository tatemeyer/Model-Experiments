name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect and run project test suite
        run: |
          set -e
          ran=false

          if [ -f package.json ]; then
            echo "Detected package.json"
            npm ci
            npm test --if-present
            ran=true
          fi

          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "Detected Python project"
            pip install -r requirements.txt 2>/dev/null || pip install -e . 2>/dev/null || true
            pip install pytest
            pytest || true
            ran=true
          fi

          if [ "$ran" = false ]; then
            echo "No recognized test manifest yet (package.json / pyproject.toml / requirements.txt)."
            echo "Nothing to verify yet — this check passes trivially until real code lands."
          fi
